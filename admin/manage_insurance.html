<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>شركات التأمين الصحي - صيدليات الحياة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .category-form-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; overflow: hidden; }
    .category-form-header { background: linear-gradient(135deg, var(--primary) 0%, #0e7490 100%); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .category-form-header h2 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; margin: 0; }
    .category-form-body { padding: 24px; }
    .form-collapsed .category-form-body { display: none; }
    .toggle-form-btn { background: rgba(255,255,255,0.2); color: white; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-active { background: #d1fae5; color: #059669; }
    .badge-inactive { background: #fee2e2; color: #dc2626; }
    .alert-box { background:#fef3c7; color:#92400e; padding:14px 18px; border-radius:12px; margin-bottom:18px; display:none; }
  </style>
</head>
<body>
  <script src="./sidebar.js"></script>
  <main>
    <div class="topbar">
      <h1><i class="fas fa-shield-heart"></i> شركات التأمين الصحي</h1>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userDisplay">مرحباً</div>
      </div>
    </div>

    <div class="alert-box" id="disabledAlert">
      <i class="fas fa-exclamation-triangle"></i> نظام التأمين الصحي غير مُفعّل حالياً. فعّله من
      <a href="settings.html">الإعدادات</a> لاستخدام هذه الميزة في نقطة البيع والتقارير.
    </div>

    <div class="category-form-card form-collapsed" id="formCard">
      <div class="category-form-header" onclick="toggleForm()">
        <h2><i class="fas fa-plus-circle"></i> إضافة شركة تأمين</h2>
        <button class="toggle-form-btn"><i class="fas fa-chevron-down" id="toggleIcon"></i></button>
      </div>
      <div class="category-form-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">اسم الشركة</label><input id="iName" class="form-control" placeholder="اسم شركة التأمين"></div>
          <div class="form-group"><label class="form-label">نسبة الخصم (%)</label><input id="iPct" type="number" min="0" max="100" step="0.01" class="form-control" placeholder="مثال: 20"></div>
          <div class="form-group"><label class="form-label">ملاحظات</label><input id="iNotes" class="form-control" placeholder="اختياري"></div>
          <div class="form-group"><label class="form-label">الحالة</label>
            <select id="iActive" class="form-control"><option value="1">نشطة</option><option value="0">غير نشطة</option></select>
          </div>
        </div>
        <div class="form-actions" style="margin-top:12px;">
          <button id="addBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة</button>
          <button type="button" class="btn btn-secondary" onclick="toggleForm()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3><i class="fas fa-building"></i> الشركات المسجلة</h3></div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table" id="iTable">
            <thead><tr><th>الاسم</th><th>نسبة الخصم</th><th>ملاحظات</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="./auth-check.js"></script>
  <script>
    const apiBase = '../api.php';
    let isFormCollapsed = true;

    async function checkAuthAndRedirect() {
      try {
        const res = await fetch('../api.php?action=check_session', { credentials: 'include' });
        const json = await res.json();
        if (!json.success) { window.location.href = '../login.php'; return false; }
        const user = json.data;
        if (user.role !== 'admin' && user.role !== 'manager') { window.location.href = '../index.html'; return false; }
        document.getElementById('userAvatar').textContent = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2);
        document.getElementById('userDisplay').textContent = user.full_name;
        return true;
      } catch (err) { window.location.href = '../login.php'; return false; }
    }

    window.addEventListener('load', async () => {
      if (await checkAuthAndRedirect()) { await checkEnabled(); loadCompanies(); }
    });

    async function checkEnabled() {
      try {
        const s = await callAPI('get_settings');
        if (s.uses_health_insurance !== '1') document.getElementById('disabledAlert').style.display = 'block';
      } catch (e) {}
    }

    function toggleForm() {
      isFormCollapsed = !isFormCollapsed;
      document.getElementById('formCard').classList.toggle('form-collapsed', isFormCollapsed);
      document.getElementById('toggleIcon').className = isFormCollapsed ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
    }

    async function callAPI(action, method='GET', data=null) {
      const opts = { method, credentials: 'include' };
      if (method === 'POST' && data) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(data); }
      const res = await fetch(`${apiBase}?action=${action}`, opts);
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'خطأ');
      return json.data;
    }
    function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, (c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);}

    async function loadCompanies() {
      try {
        const list = await callAPI('get_insurance_companies');
        const tbody = document.querySelector('#iTable tbody');
        tbody.innerHTML = '';
        list.forEach(c => {
          const active = c.is_active == '1';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input data-id="${c.id}" class="e-name form-control" value="${escapeHtml(c.name)}"></td>
            <td><input data-id="${c.id}" class="e-pct form-control" type="number" min="0" max="100" step="0.01" value="${c.discount_percentage}"></td>
            <td><input data-id="${c.id}" class="e-notes form-control" value="${escapeHtml(c.notes||'')}"></td>
            <td><span class="badge ${active?'badge-active':'badge-inactive'}">${active?'نشطة':'غير نشطة'}</span></td>
            <td><div class="btn-group">
              <button class="btn btn-primary btn-sm" data-action="save" data-id="${c.id}"><i class="fas fa-save"></i></button>
              <button class="btn btn-secondary btn-sm" data-action="toggle" data-id="${c.id}"><i class="fas fa-power-off"></i></button>
              <button class="btn btn-danger btn-sm" data-action="delete" data-id="${c.id}"><i class="fas fa-trash"></i></button>
            </div></td>`;
          tbody.appendChild(tr);
        });
      } catch (err) { alert('خطأ: ' + err.message); }
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = document.getElementById('iName').value.trim();
      const pct = parseFloat(document.getElementById('iPct').value) || 0;
      if (!name) { alert('أدخل اسم الشركة'); return; }
      if (pct < 0 || pct > 100) { alert('نسبة الخصم يجب أن تكون بين 0 و 100'); return; }
      try {
        await callAPI('add_insurance_company', 'POST', {
          name, discount_percentage: pct,
          notes: document.getElementById('iNotes').value.trim(),
          is_active: document.getElementById('iActive').value === '1'
        });
        document.getElementById('iName').value=''; document.getElementById('iPct').value=''; document.getElementById('iNotes').value='';
        await loadCompanies(); alert('تمت الإضافة');
      } catch (err) { alert('خطأ: ' + err.message); }
    });

    document.querySelector('#iTable').addEventListener('click', async (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      const action = btn.getAttribute('data-action'); const id = parseInt(btn.getAttribute('data-id'));
      try {
        if (action === 'save') {
          const name = document.querySelector(`.e-name[data-id='${id}']`).value.trim();
          const pct = parseFloat(document.querySelector(`.e-pct[data-id='${id}']`).value) || 0;
          const notes = document.querySelector(`.e-notes[data-id='${id}']`).value.trim();
          const active = btn.closest('tr').querySelector('.badge-active') !== null;
          if (!name) { alert('الاسم مطلوب'); return; }
          await callAPI('update_insurance_company', 'POST', { id, name, discount_percentage: pct, notes, is_active: active });
          alert('تم الحفظ'); await loadCompanies();
        } else if (action === 'toggle') {
          await callAPI('toggle_insurance_company', 'POST', { id }); await loadCompanies();
        } else if (action === 'delete') {
          if (!confirm('حذف شركة التأمين؟')) return;
          await callAPI('delete_insurance_company', 'POST', { id }); await loadCompanies();
        }
      } catch (err) { alert('خطأ: ' + err.message); }
    });
  </script>
</body>
</html>
