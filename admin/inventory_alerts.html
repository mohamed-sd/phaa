<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تنبيهات المخزون - صيدليات الحياة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    /* ── Stats Cards ── */
    .alert-stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 1100px) { .alert-stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .alert-stats-grid { grid-template-columns: 1fr; } }

    .alert-stat-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-right: 5px solid;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .alert-stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .alert-stat-card.expired    { border-right-color: #ef4444; }
    .alert-stat-card.expiring   { border-right-color: #f59e0b; }
    .alert-stat-card.out-stock  { border-right-color: #ec4899; }
    .alert-stat-card.low-stock  { border-right-color: #eab308; }

    .asc-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .expired  .asc-icon { background: #fee2e2; color: #ef4444; }
    .expiring .asc-icon { background: #fef3c7; color: #f59e0b; }
    .out-stock .asc-icon { background: #fce7f3; color: #ec4899; }
    .low-stock .asc-icon { background: #fef9c3; color: #eab308; }

    .asc-info h3 { font-size: 28px; font-weight: 700; color: var(--gray-800); margin: 0 0 4px; }
    .asc-info p  { font-size: 13px; color: var(--gray-500); margin: 0; }

    /* ── Controls bar ── */
    .controls-bar {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls-bar input,
    .controls-bar select {
      padding: 10px 14px;
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .controls-bar input:focus,
    .controls-bar select:focus { outline: none; border-color: var(--primary); }
    .controls-bar input { flex: 1; min-width: 220px; }

    /* ── Table card ── */
    .alerts-table-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .alerts-table-card-header {
      padding: 18px 24px;
      border-bottom: 2px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .alerts-table-card-header h2 {
      font-size: 17px;
      font-weight: 600;
      color: var(--gray-800);
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
    }
    .alerts-table-card-header h2 i { color: var(--warning); }

    .atc-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .atc-table th {
      background: #f8fafc;
      padding: 13px 14px;
      text-align: right;
      font-weight: 600;
      color: var(--gray-600);
      border-bottom: 2px solid var(--gray-200);
      white-space: nowrap;
    }
    .atc-table td {
      padding: 13px 14px;
      border-bottom: 1px solid var(--gray-200);
      vertical-align: middle;
    }
    .atc-table tr:hover td { background: #f8fafc; }
    .atc-table tr:last-child td { border-bottom: none; }

    /* status badges */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .sb-expired   { background: #fee2e2; color: #ef4444; }
    .sb-expiring  { background: #fef3c7; color: #d97706; }
    .sb-outstock  { background: #fce7f3; color: #be185d; }
    .sb-lowstock  { background: #fef9c3; color: #a16207; }

    /* quantity column */
    .qty-cell { font-weight: 700; }
    .qty-zero   { color: #ef4444; }
    .qty-low    { color: #eab308; }
    .qty-normal { color: var(--success); }

    /* expiry column */
    .exp-past   { color: #ef4444; font-weight: 600; }
    .exp-soon   { color: #f59e0b; font-weight: 600; }

    /* pagination */
    .pagination-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-top: 1px solid var(--gray-200);
      font-size: 13px;
      color: var(--gray-500);
      flex-wrap: wrap;
      gap: 10px;
    }
    .pager-btns { display: flex; gap: 6px; }
    .pager-btns button {
      padding: 6px 12px;
      border: 1px solid var(--gray-300);
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .pager-btns button:hover { background: var(--gray-100); }
    .pager-btns button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .pager-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* empty state */
    .empty-table-row td {
      text-align: center;
      padding: 50px 20px;
      color: var(--gray-500);
      font-size: 15px;
    }
    .empty-table-row i { font-size: 48px; display: block; margin-bottom: 12px; color: var(--gray-300); }

    /* loading overlay */
    .loading-overlay {
      text-align: center;
      padding: 60px;
      color: var(--gray-500);
    }
    .loading-overlay .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <script src="./sidebar.js"></script>

  <main>
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-title">
        <i class="fas fa-bell" style="color: var(--warning);"></i>
        <span>تنبيهات المخزون</span>
      </div>
      <div class="user-section">
        <div id="userAvatar"></div>
        <span id="userDisplay">مرحباً</span>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="alert-stats-grid">
      <div class="alert-stat-card expired">
        <div class="asc-icon"><i class="fas fa-skull-crossbones"></i></div>
        <div class="asc-info">
          <h3 id="countExpired">0</h3>
          <p>منتجات منتهية الصلاحية</p>
        </div>
      </div>
      <div class="alert-stat-card expiring">
        <div class="asc-icon"><i class="fas fa-clock"></i></div>
        <div class="asc-info">
          <h3 id="countExpiring">0</h3>
          <p>تنتهي صلاحيتها قريباً</p>
        </div>
      </div>
      <div class="alert-stat-card out-stock">
        <div class="asc-icon"><i class="fas fa-box-open"></i></div>
        <div class="asc-info">
          <h3 id="countOutStock">0</h3>
          <p>نفد من المخزون</p>
        </div>
      </div>
      <div class="alert-stat-card low-stock">
        <div class="asc-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="asc-info">
          <h3 id="countLowStock">0</h3>
          <p>مخزون منخفض</p>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <input type="text" id="searchInput" placeholder="🔍 ابحث باسم المنتج أو الباركود...">
      <select id="filterType">
        <option value="">جميع التنبيهات</option>
        <option value="expired">منتهي الصلاحية</option>
        <option value="expiring">ينتهي قريباً</option>
        <option value="out_of_stock">نفد من المخزون</option>
        <option value="low_stock">مخزون منخفض</option>
      </select>
      <select id="sortBy">
        <option value="status">ترتيب حسب الحالة</option>
        <option value="name">ترتيب حسب الاسم</option>
        <option value="qty_asc">الكمية (الأقل أولاً)</option>
        <option value="expiry_asc">تاريخ الانتهاء (الأقرب أولاً)</option>
      </select>
      <button class="btn btn-secondary" onclick="resetFilters()">
        <i class="fas fa-times"></i> إعادة تعيين
      </button>
      <button class="btn btn-primary" onclick="loadAlerts()">
        <i class="fas fa-sync-alt"></i> تحديث
      </button>
    </div>

    <!-- Alerts Table -->
    <div class="alerts-table-card">
      <div class="alerts-table-card-header">
        <h2><i class="fas fa-exclamation-circle"></i> قائمة المنتجات المنبّهة</h2>
        <span class="badge badge-warning" id="totalCount">0 منتج</span>
      </div>

      <div style="overflow-x: auto; padding: 0 24px 0;">
        <table class="atc-table">
          <thead>
            <tr>
              <th>#</th>
              <th>المنتج</th>
              <th>الباركود</th>
              <th>الفئة</th>
              <th>الكمية الحالية</th>
              <th>الحد الأدنى</th>
              <th>تاريخ الانتهاء</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="alertsTableBody">
            <tr class="empty-table-row">
              <td colspan="8">
                <div class="loading-overlay">
                  <div class="spinner"></div>
                  <p>جاري تحميل البيانات...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-bar">
        <span id="paginationInfo">عرض 0 من 0 منتج</span>
        <div class="pager-btns" id="pagerBtns"></div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="./auth-check.js"></script>
  <script>
    // ── State ──────────────────────────────────────────────
    let allAlerts = [];      // flat array of all alert items
    let filtered  = [];      // after search + filter
    let currentPage = 1;
    const PAGE_SIZE = 25;

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ── Init ───────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const user = JSON.parse(localStorage.getItem('user') || sessionStorage.getItem('user') || '{}');
      if (user.username) {
        document.getElementById('userDisplay').textContent = user.full_name || user.username;
        document.getElementById('userAvatar').textContent = (user.full_name || user.username).charAt(0).toUpperCase();
      }

      loadAlerts();

      document.getElementById('searchInput').addEventListener('input', applyFilters);
      document.getElementById('filterType').addEventListener('change', applyFilters);
      document.getElementById('sortBy').addEventListener('change', applyFilters);
    });

    // ── Load data ──────────────────────────────────────────
    async function loadAlerts() {
      try {
        const res = await fetch('../api.php?action=get_alerts');
        const json = await res.json();
        if (!json.success) throw new Error(json.message);

        const d = json.data;

        // Update stat cards
        document.getElementById('countExpired').textContent  = d.expired?.length || 0;
        document.getElementById('countExpiring').textContent = d.expiring_soon?.length || 0;
        document.getElementById('countOutStock').textContent = d.out_of_stock?.length || 0;
        document.getElementById('countLowStock').textContent = d.low_stock?.length || 0;

        // Build flat array with alert_type tag
        allAlerts = [];
        (d.expired      || []).forEach(p => allAlerts.push({ ...p, alert_type: 'expired' }));
        (d.expiring_soon|| []).forEach(p => allAlerts.push({ ...p, alert_type: 'expiring' }));
        (d.out_of_stock || []).forEach(p => allAlerts.push({ ...p, alert_type: 'out_of_stock' }));
        (d.low_stock    || []).forEach(p => allAlerts.push({ ...p, alert_type: 'low_stock' }));

        // De-duplicate by product id (a product can appear in multiple lists)
        const seen = new Set();
        allAlerts = allAlerts.filter(p => {
          if (seen.has(p.id)) return false;
          seen.add(p.id);
          return true;
        });

        applyFilters();
      } catch (err) {
        console.error(err);
        showToast('خطأ في تحميل التنبيهات: ' + err.message, 'error');
        document.getElementById('alertsTableBody').innerHTML = `
          <tr class="empty-table-row"><td colspan="8">
            <i class="fas fa-exclamation-circle"></i>
            <p>حدث خطأ في تحميل البيانات. حاول مرة أخرى.</p>
          </td></tr>`;
      }
    }

    // ── Filter + Sort + Paginate ──────────────────────────
    function applyFilters() {
      const q    = document.getElementById('searchInput').value.toLowerCase().trim();
      const type = document.getElementById('filterType').value;
      const sort = document.getElementById('sortBy').value;

      filtered = allAlerts.filter(p => {
        const matchQ    = !q || p.name?.toLowerCase().includes(q) || (p.barcode || '').toLowerCase().includes(q);
        const matchType = !type || p.alert_type === type;
        return matchQ && matchType;
      });

      // Sort
      const typeOrder = { expired: 0, expiring: 1, out_of_stock: 2, low_stock: 3 };
      switch (sort) {
        case 'name':
          filtered.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ar'));
          break;
        case 'qty_asc':
          filtered.sort((a, b) => stockOf(a) - stockOf(b));
          break;
        case 'expiry_asc':
          filtered.sort((a, b) => {
            if (!a.expiry_date && !b.expiry_date) return 0;
            if (!a.expiry_date) return 1;
            if (!b.expiry_date) return -1;
            return new Date(a.expiry_date) - new Date(b.expiry_date);
          });
          break;
        default: // status
          filtered.sort((a, b) => (typeOrder[a.alert_type] ?? 9) - (typeOrder[b.alert_type] ?? 9));
      }

      document.getElementById('totalCount').textContent = filtered.length + ' منتج';
      currentPage = 1;
      renderTable();
      renderPagination();
    }

    function stockOf(p) {
      return parseInt(p.stock_strips ?? p.current_stock ?? p.stock ?? 0);
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('filterType').value  = '';
      document.getElementById('sortBy').value       = 'status';
      applyFilters();
    }

    // ── Render Table ───────────────────────────────────────
    function renderTable() {
      const tbody = document.getElementById('alertsTableBody');
      const start = (currentPage - 1) * PAGE_SIZE;
      const page  = filtered.slice(start, start + PAGE_SIZE);

      if (page.length === 0) {
        tbody.innerHTML = `
          <tr class="empty-table-row"><td colspan="8">
            <i class="fas fa-search"></i>
            <p>لا توجد منتجات مطابقة لمعايير البحث</p>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = page.map((p, i) => {
        const qty     = stockOf(p);
        const minStock = parseInt(p.min_stock || 10);
        const qtyClass = qty === 0 ? 'qty-zero' : qty <= minStock ? 'qty-low' : 'qty-normal';

        let expiryHtml = '-';
        let expiryClass = '';
        if (p.expiry_date) {
          const expDate = new Date(p.expiry_date);
          expDate.setHours(0,0,0,0);
          expiryClass = expDate < today ? 'exp-past' : 'exp-soon';
          expiryHtml = `<span class="${expiryClass}">${p.expiry_date}</span>`;
        }

        const statusHtml = buildStatusBadge(p.alert_type);

        return `
          <tr>
            <td>${start + i + 1}</td>
            <td><strong>${p.name || '-'}</strong></td>
            <td style="font-family: monospace; color: var(--gray-600);">${p.barcode || '-'}</td>
            <td>${p.category_name || '-'}</td>
            <td class="qty-cell ${qtyClass}">${qty}</td>
            <td>${minStock}</td>
            <td>${expiryHtml}</td>
            <td>${statusHtml}</td>
          </tr>
        `;
      }).join('');
    }

    function buildStatusBadge(type) {
      switch (type) {
        case 'expired':     return '<span class="status-badge sb-expired"><i class="fas fa-skull-crossbones"></i> منتهي الصلاحية</span>';
        case 'expiring':    return '<span class="status-badge sb-expiring"><i class="fas fa-clock"></i> ينتهي قريباً</span>';
        case 'out_of_stock':return '<span class="status-badge sb-outstock"><i class="fas fa-box-open"></i> نفد من المخزون</span>';
        case 'low_stock':   return '<span class="status-badge sb-lowstock"><i class="fas fa-exclamation-triangle"></i> مخزون منخفض</span>';
        default:            return '-';
      }
    }

    // ── Pagination ─────────────────────────────────────────
    function renderPagination() {
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      const start      = (currentPage - 1) * PAGE_SIZE + 1;
      const end        = Math.min(currentPage * PAGE_SIZE, filtered.length);

      document.getElementById('paginationInfo').textContent =
        filtered.length === 0 ? 'لا توجد نتائج' : `عرض ${start}–${end} من ${filtered.length} منتج`;

      const btns = document.getElementById('pagerBtns');
      btns.innerHTML = '';

      if (totalPages <= 1) return;

      const prev = document.createElement('button');
      prev.textContent = '→';
      prev.disabled = currentPage === 1;
      prev.addEventListener('click', () => { currentPage--; renderTable(); renderPagination(); });
      btns.appendChild(prev);

      // Show max 7 page buttons
      const range = pageRange(currentPage, totalPages);
      range.forEach(p => {
        const b = document.createElement('button');
        b.textContent = p === '…' ? '…' : p;
        if (p === '…') { b.disabled = true; b.style.cursor = 'default'; }
        else {
          if (p === currentPage) b.classList.add('active');
          b.addEventListener('click', () => { currentPage = p; renderTable(); renderPagination(); });
        }
        btns.appendChild(b);
      });

      const next = document.createElement('button');
      next.textContent = '←';
      next.disabled = currentPage === totalPages;
      next.addEventListener('click', () => { currentPage++; renderTable(); renderPagination(); });
      btns.appendChild(next);
    }

    function pageRange(current, total) {
      if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
      if (current <= 4) return [1, 2, 3, 4, 5, '…', total];
      if (current >= total - 3) return [1, '…', total-4, total-3, total-2, total-1, total];
      return [1, '…', current-1, current, current+1, '…', total];
    }

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
