<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>لوحة التحكم - صيدليات الحياة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    /* Page Specific Styles */

    /* Charts Section */
    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .chart-card {
      background: white;
      padding: 24px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
    }

    .chart-card h3 {
      color: var(--gray-800);
      margin-bottom: 16px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chart-card h3 i {
      color: var(--primary);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gray-500);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Alerts Section */
    .alerts-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .alert-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--gray-200);
      border-right: 4px solid;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .alert-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .alert-card.expired {
      border-right-color: var(--danger);
    }

    .alert-card.expiring-soon {
      border-right-color: var(--warning);
    }

    .alert-card.low-stock {
      border-right-color: #eab308;
    }

    .alert-card.out-of-stock {
      border-right-color: #dc2626;
    }

    .alert-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .alert-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-600);
    }

    .alert-count {
      font-size: 24px;
      font-weight: 700;
      color: var(--gray-800);
    }

    .alert-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .alert-card.expired .alert-icon {
      background: var(--danger-light);
      color: var(--danger);
    }

    .alert-card.expiring-soon .alert-icon {
      background: var(--warning-light);
      color: var(--warning);
    }

    .alert-card.low-stock .alert-icon {
      background: #fef9c3;
      color: #eab308;
    }

    .alert-card.out-of-stock .alert-icon {
      background: var(--danger-light);
      color: #dc2626;
    }

    .alert-footer {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 10px;
    }

    .alert-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      font-size: 13px;
    }

    .alert-link:hover {
      color: var(--primary-dark);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .alerts-container { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .alerts-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Sidebar - يتم تحميله تلقائياً من sidebar.js -->
  <script src="./sidebar.js"></script>

  <main>
    <div class="topbar">
      <h1>
        <i class="fas fa-chart-line"></i>
        لوحة التحكم
      </h1>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userName">المسؤول</div>
      </div>
    </div>

    <!-- Welcome Card -->
    <div class="welcome-card">
      <h2 id="welcomeMessage">أهلاً وسهلاً 👋</h2>
      <p>مرحباً بك في لوحة التحكم. هنا يمكنك إدارة جميع جوانب الصيدلية</p>
    </div>

    <!-- Alerts Section -->
    <div id="alertsSection"></div>


      <!-- Stats Grid -->
      <div class="stats-grid" id="statsContainer">
        <div class="loading">
          <div class="spinner"></div>
          <p>جاري تحميل الإحصائيات...</p>
        </div>
      </div>

    <!-- Charts -->
    <div class="charts-section" id="chartsContainer">
    </div>
  </main>

  <script>
    const API_BASE = '../api.php';

    // Check authentication
    async function checkAuth() {
      try {
        console.log('Checking authentication...');
        const res = await fetch(`${API_BASE}?action=check_session`, { credentials: 'include' });
        const json = await res.json();
        console.log('Auth response:', json);
        
        if (!json.success) {
          console.log('No active session, redirecting to login');
          window.location.href = '../login.php';
          return false;
        }
        
        const user = json.data;
        if (user.role !== 'admin' && user.role !== 'manager') {
          console.log('User is not admin/manager, redirecting to index');
          window.location.href = '../index.html';
          return false;
        }
        
        // Update user display
        document.getElementById('userName').textContent = user.full_name;
        document.getElementById('welcomeMessage').textContent = `أهلاً بك ${user.full_name}! 👋`;
        const initials = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2);
        document.getElementById('userAvatar').textContent = initials;
        
        localStorage.setItem('auth_user', JSON.stringify(user));
        console.log('Auth check passed for user:', user.full_name);
        
        return true;
      } catch (err) {
        console.error('Auth check error:', err);
        window.location.href = '../login.php';
        return false;
      }
    }

    async function logout() {
      try {
        await fetch(`${API_BASE}?action=logout`, { method: 'POST', credentials: 'include' });
        localStorage.removeItem('auth_user');
        window.location.href = '../login.php';
      } catch (err) {
        localStorage.removeItem('auth_user');
        window.location.href = '../login.php';
      }
    }

    // Load alerts
    async function loadAlerts() {
      try {
        const res = await fetch(`${API_BASE}?action=get_alerts`, { credentials: 'include' });
        const json = await res.json();
        
        if (json.success) {
          displayAlerts(json.data);
        }
      } catch (err) {
        console.error('Error loading alerts:', err);
      }
    }

    function displayAlerts(alerts) {
      const container = document.getElementById('alertsSection');
      
      const totalAlerts = (alerts.expired?.length || 0) + 
                          (alerts.expiring_soon?.length || 0) + 
                          (alerts.low_stock?.length || 0) + 
                          (alerts.out_of_stock?.length || 0);
      
      if (totalAlerts === 0) {
        container.innerHTML = '';
        return;
      }

      const alertsHTML = `
        <div class="alerts-container">
          ${alerts.expired && alerts.expired.length > 0 ? `
          <div class="alert-card expired">
            <div class="alert-header">
              <div>
                <div class="alert-title">منتجات منتهية الصلاحية</div>
                <div class="alert-count">${alerts.expired.length}</div>
              </div>
              <div class="alert-icon">
                <i class="fas fa-times-circle"></i>
              </div>
            </div>
            <div class="alert-footer">
              يجب إزالتها من المخزون فوراً
              <a href="manage_products.html" class="alert-link">
                عرض المنتجات <i class="fas fa-arrow-left"></i>
              </a>
            </div>
          </div>
          ` : ''}
          
          ${alerts.expiring_soon && alerts.expiring_soon.length > 0 ? `
          <div class="alert-card expiring-soon">
            <div class="alert-header">
              <div>
                <div class="alert-title">منتجات قريبة من الانتهاء</div>
                <div class="alert-count">${alerts.expiring_soon.length}</div>
              </div>
              <div class="alert-icon">
                <i class="fas fa-exclamation-triangle"></i>
              </div>
            </div>
            <div class="alert-footer">
              تنتهي خلال 30 يوماً
              <a href="manage_products.html" class="alert-link">
                عرض المنتجات <i class="fas fa-arrow-left"></i>
              </a>
            </div>
          </div>
          ` : ''}
          
          ${alerts.out_of_stock && alerts.out_of_stock.length > 0 ? `
          <div class="alert-card out-of-stock">
            <div class="alert-header">
              <div>
                <div class="alert-title">منتجات نفذت من المخزون</div>
                <div class="alert-count">${alerts.out_of_stock.length}</div>
              </div>
              <div class="alert-icon">
                <i class="fas fa-ban"></i>
              </div>
            </div>
            <div class="alert-footer">
              يجب إعادة التوريد
              <a href="manage_products.html" class="alert-link">
                عرض المنتجات <i class="fas fa-arrow-left"></i>
              </a>
            </div>
          </div>
          ` : ''}
          
          ${alerts.low_stock && alerts.low_stock.length > 0 ? `
          <div class="alert-card low-stock">
            <div class="alert-header">
              <div>
                <div class="alert-title">منتجات منخفضة المخزون</div>
                <div class="alert-count">${alerts.low_stock.length}</div>
              </div>
              <div class="alert-icon">
                <i class="fas fa-arrow-down"></i>
              </div>
            </div>
            <div class="alert-footer">
              أقل من الحد الأدنى المطلوب
              <a href="manage_products.html" class="alert-link">
                عرض المنتجات <i class="fas fa-arrow-left"></i>
              </a>
            </div>
          </div>
          ` : ''}
        </div>
      `;
      
      container.innerHTML = alertsHTML;
    }

    // Load statistics
    async function loadStatistics() {
      try {
        console.log('Loading statistics...');
        const res = await fetch(`${API_BASE}?action=get_dashboard_stats`, { credentials: 'include' });
        const json = await res.json();
        console.log('Stats response:', json);
        
        if (json.success) {
          displayStats(json.data);
        } else {
          document.getElementById('statsContainer').innerHTML = `
            <div class="stat-card" style="grid-column: span 4; text-align: center; color: #ef4444;">
              <i class="fas fa-exclamation-circle"></i> خطأ في تحميل الإحصائيات: ${json.message || 'غير معروف'}
            </div>
          `;
        }
      } catch (err) {
        console.error('Error loading stats:', err);
        document.getElementById('statsContainer').innerHTML = `
          <div class="stat-card" style="grid-column: span 4; text-align: center; color: #ef4444;">
            <i class="fas fa-exclamation-circle"></i> خطأ في الاتصال بالخادم
          </div>
        `;
      }
    }

    function displayStats(stats) {
      const container = document.getElementById('statsContainer');
      
      const statsHTML = `
        <div class="stat-card blue">
          <div class="stat-header">
            <div>
              <div class="stat-label">إجمالي المنتجات</div>
              <div class="stat-value">${stats.total_products || 0}</div>
            </div>
            <div class="stat-icon">
              <i class="fas fa-pills"></i>
            </div>
          </div>
          <div class="stat-footer">المنتجات المتاحة في النظام</div>
        </div>

        <div class="stat-card yellow">
          <div class="stat-header">
            <div>
              <div class="stat-label">عدد الفئات</div>
              <div class="stat-value">${stats.total_categories || 0}</div>
            </div>
            <div class="stat-icon">
              <i class="fas fa-list"></i>
            </div>
          </div>
          <div class="stat-footer">تصنيفات المنتجات</div>
        </div>

        <div class="stat-card green">
          <div class="stat-header">
            <div>
              <div class="stat-label">إجمالي الفواتير</div>
              <div class="stat-value">${stats.total_invoices || 0}</div>
            </div>
            <div class="stat-icon">
              <i class="fas fa-receipt"></i>
            </div>
          </div>
          <div class="stat-footer">المبيعات المسجلة</div>
        </div>

        <div class="stat-card red">
          <div class="stat-header">
            <div>
              <div class="stat-label">المبيعات اليومية</div>
              <div class="stat-value">${parseFloat(stats.today_sales || 0).toFixed(2)}</div>
            </div>
            <div class="stat-icon">
              <i class="fas fa-money-bill-wave"></i>
            </div>
          </div>
          <div class="stat-footer">جنيه مصري</div>
        </div>

        <div class="stat-card" style="border-top-color: #8b5cf6;">
          <div class="stat-header">
            <div>
              <div class="stat-label">عدد المستخدمين</div>
              <div class="stat-value">${stats.total_users || 0}</div>
            </div>
            <div class="stat-icon" style="background: #ede9fe; color: #8b5cf6;">
              <i class="fas fa-users"></i>
            </div>
          </div>
          <div class="stat-footer">الموظفون النشطون</div>
        </div>

        <div class="stat-card" style="border-top-color: #06b6d4;">
          <div class="stat-header">
            <div>
              <div class="stat-label">المنتجات منخفضة المخزون</div>
              <div class="stat-value">${stats.low_stock_products || 0}</div>
            </div>
            <div class="stat-icon" style="background: #cffafe; color: #06b6d4;">
              <i class="fas fa-exclamation-triangle"></i>
            </div>
          </div>
          <div class="stat-footer">أقل من 10 وحدات</div>
        </div>
      `;
      
      container.innerHTML = statsHTML;
    }

    // Setup logout button
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.addEventListener('click', logout);

    // Initialize
    window.addEventListener('load', async () => {
      const authOk = await checkAuth();
      if (authOk) {
        // Load both independently - don't let one failure stop the other
        loadAlerts().catch(err => console.error('Alerts error:', err));
        loadStatistics().catch(err => console.error('Stats error:', err));
      }
    });

    // Active link in sidebar
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function() {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
