<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>إدارة العملاء - صيدليات الحياة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="admin-styles.css">
  <style>
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 12px; }
    .category-form-card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; overflow: hidden; }
    .category-form-header { background: linear-gradient(135deg, var(--primary) 0%, #0e7490 100%); color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .category-form-header h2 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; margin: 0; }
    .category-form-body { padding: 24px; }
    .form-collapsed .category-form-body { display: none; }
    .toggle-form-btn { background: rgba(255,255,255,0.2); color: white; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; }
    .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .balance-pos { color: #dc2626; font-weight: 700; }
  </style>
</head>
<body>
  <script src="./sidebar.js"></script>
  <main>
    <div class="topbar">
      <h1><i class="fas fa-user-group"></i> إدارة العملاء</h1>
      <div class="user-info">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-name" id="userDisplay">مرحباً</div>
      </div>
    </div>

    <div class="category-form-card form-collapsed" id="formCard">
      <div class="category-form-header" onclick="toggleForm()">
        <h2><i class="fas fa-user-plus"></i> إضافة عميل جديد</h2>
        <button class="toggle-form-btn"><i class="fas fa-chevron-down" id="toggleIcon"></i></button>
      </div>
      <div class="category-form-body">
        <div class="form-grid">
          <div class="form-group"><label class="form-label">الاسم</label><input id="cName" class="form-control" placeholder="اسم العميل"></div>
          <div class="form-group"><label class="form-label">الهاتف</label><input id="cPhone" class="form-control" placeholder="رقم الهاتف"></div>
          <div class="form-group"><label class="form-label">البريد</label><input id="cEmail" class="form-control" placeholder="اختياري"></div>
          <div class="form-group"><label class="form-label">العنوان</label><input id="cAddress" class="form-control" placeholder="اختياري"></div>
          <div class="form-group"><label class="form-label">ملاحظات</label><input id="cNotes" class="form-control" placeholder="اختياري"></div>
        </div>
        <div class="form-actions" style="margin-top:12px;">
          <button id="addBtn" class="btn btn-primary"><i class="fas fa-plus"></i> إضافة</button>
          <button type="button" class="btn btn-secondary" onclick="toggleForm()"><i class="fas fa-times"></i> إغلاق</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h3><i class="fas fa-users"></i> العملاء المسجلون</h3></div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table" id="cTable">
            <thead><tr><th>الاسم</th><th>الهاتف</th><th>الرصيد المستحق</th><th>الإجراءات</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="./auth-check.js"></script>
  <script>
    const apiBase = '../api.php';
    let isFormCollapsed = true;
    let currency = 'ج.م';

    async function checkAuthAndRedirect() {
      try {
        const res = await fetch('../api.php?action=check_session', { credentials: 'include' });
        const json = await res.json();
        if (!json.success) { window.location.href = '../login.php'; return false; }
        const user = json.data;
        if (user.role !== 'admin' && user.role !== 'manager') { window.location.href = '../index.html'; return false; }
        document.getElementById('userAvatar').textContent = user.full_name.split(' ').map(n => n[0]).join('').substring(0, 2);
        document.getElementById('userDisplay').textContent = user.full_name;
        return true;
      } catch (err) { window.location.href = '../login.php'; return false; }
    }

    window.addEventListener('load', async () => {
      if (await checkAuthAndRedirect()) { await loadCurrency(); loadCustomers(); }
    });

    async function loadCurrency() {
      try { const s = await callAPI('get_settings'); if (s.currency_symbol) currency = s.currency_symbol; } catch (e) {}
    }

    function toggleForm() {
      isFormCollapsed = !isFormCollapsed;
      document.getElementById('formCard').classList.toggle('form-collapsed', isFormCollapsed);
      document.getElementById('toggleIcon').className = isFormCollapsed ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
    }

    async function callAPI(action, method='GET', data=null) {
      const opts = { method, credentials: 'include' };
      if (method === 'POST' && data) { opts.headers = {'Content-Type':'application/json'}; opts.body = JSON.stringify(data); }
      const res = await fetch(`${apiBase}?action=${action}`, opts);
      const json = await res.json();
      if (!json.success) throw new Error(json.message || 'خطأ');
      return json.data;
    }
    function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, (c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);}

    async function loadCustomers() {
      try {
        const list = await callAPI('get_customers');
        const tbody = document.querySelector('#cTable tbody');
        tbody.innerHTML = '';
        list.forEach(c => {
          const bal = parseFloat(c.balance) || 0;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><input data-id="${c.id}" class="e-name form-control" value="${escapeHtml(c.name)}"></td>
            <td><input data-id="${c.id}" class="e-phone form-control" value="${escapeHtml(c.phone||'')}"></td>
            <td class="${bal>0?'balance-pos':''}">${bal.toFixed(2)} ${currency}</td>
            <td><div class="btn-group">
              <button class="btn btn-primary btn-sm" data-action="save" data-id="${c.id}"><i class="fas fa-save"></i></button>
              <button class="btn btn-danger btn-sm" data-action="toggle" data-id="${c.id}" title="تعطيل"><i class="fas fa-user-slash"></i></button>
            </div></td>`;
          tbody.appendChild(tr);
        });
      } catch (err) { alert('خطأ: ' + err.message); }
    }

    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = document.getElementById('cName').value.trim();
      if (!name) { alert('أدخل اسم العميل'); return; }
      try {
        await callAPI('add_customer', 'POST', {
          name, phone: document.getElementById('cPhone').value.trim(),
          email: document.getElementById('cEmail').value.trim(),
          address: document.getElementById('cAddress').value.trim(),
          notes: document.getElementById('cNotes').value.trim()
        });
        ['cName','cPhone','cEmail','cAddress','cNotes'].forEach(id => document.getElementById(id).value = '');
        await loadCustomers(); alert('تمت الإضافة');
      } catch (err) { alert('خطأ: ' + err.message); }
    });

    document.querySelector('#cTable').addEventListener('click', async (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      const action = btn.getAttribute('data-action'); const id = parseInt(btn.getAttribute('data-id'));
      try {
        if (action === 'save') {
          const name = document.querySelector(`.e-name[data-id='${id}']`).value.trim();
          const phone = document.querySelector(`.e-phone[data-id='${id}']`).value.trim();
          if (!name) { alert('الاسم مطلوب'); return; }
          await callAPI('update_customer', 'POST', { id, name, phone });
          alert('تم الحفظ'); await loadCustomers();
        } else if (action === 'toggle') {
          if (!confirm('تعطيل/تفعيل هذا العميل؟')) return;
          await callAPI('toggle_customer_status', 'POST', { id }); await loadCustomers();
        }
      } catch (err) { alert('خطأ: ' + err.message); }
    });
  </script>
</body>
</html>
