  <style>
    /* Additional inline styles for quick access */
    .icon-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: var(--success-gradient);
      color: white;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow-sm);
    }

    /* Alerts Section - Header Style */
    .alerts-banner {
      display: none;
      background: linear-gradient(135deg, #fef2f2 0%, #fef9c3 100%);
      border: 1px solid #fbbf24;
      border-radius: var(--radius-md);
      padding: 8px 14px;
      max-width: 380px;
      position: relative;
      cursor: pointer;
    }

    .alerts-banner.show {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .alerts-banner .alert-icon-main {
      color: #dc2626;
      font-size: 18px;
      animation: pulse 2s infinite;
    }

    .alerts-banner .alert-summary {
      font-size: 12px;
      font-weight: 600;
      color: #b45309;
      white-space: nowrap;
    }

    .alerts-banner .alert-count {
      background: #dc2626;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
    }

    /* Alerts Dropdown */
    .alerts-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border-color);
      min-width: 350px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 1000;
    }

    .alerts-banner:hover .alerts-dropdown,
    .alerts-dropdown:hover {
      display: block;
    }

    .alerts-dropdown-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      background: linear-gradient(135deg, #fef2f2 0%, #fef9c3 100%);
      border-radius: var(--radius-md) var(--radius-md) 0 0;
    }

    .alerts-dropdown-header h4 {
      color: #dc2626;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }

    .alerts-content {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .alert-item {
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border-right: 3px solid #dc2626;
      font-size: 12px;
      line-height: 1.4;
      transition: all 0.2s ease;
    }

    .alert-item:hover {
      background: #f1f5f9;
      transform: translateX(-2px);
    }

    .alert-item.expiring {
      border-right-color: #f59e0b;
    }

    .alert-item.low-stock {
      border-right-color: #eab308;
    }

    .alert-icon {
      margin-left: 4px;
    }

    /* Header Action Buttons Enhancement */
    #logoutBtn {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%) !important;
      color: #b45309 !important;
      transition: all 0.3s ease !important;
    }

    #logoutBtn:hover {

  <script>
    /**
     * Authentication Check - Must run before app.js
     */
    const API_BASE = './api.php';
    
    async function checkAuthAndInitialize() {
      try {
        const res = await fetch(`${API_BASE}?action=check_session`);
        const json = await res.json();
        
        if (!json.success) {
          // Not authenticated, redirect to login
          window.location.href = './login.php';
          return false;
        }
        
        // User is authenticated, store info and show name
        const userData = json.data;
        localStorage.setItem('auth_user', JSON.stringify(userData));
        
        // Update user display
        const userDisplayText = document.getElementById('userDisplayText');
        if (userDisplayText) {
          userDisplayText.textContent = `مرحباً ${userData.full_name}`;
        }
        
        // Set up logout button
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', logout);
        }
        
        return true;
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = './login.php';
        return false;
      }
    }
    
    async function logout() {
      try {
        const res = await fetch(`${API_BASE}?action=logout`, { method: 'POST' });
        const json = await res.json();
        if (json.success || !json.success) {
          // Clear local data
          localStorage.removeItem('auth_user');
          localStorage.removeItem('pharmacy_cart_v1');
          localStorage.removeItem('pharmacy_windows_v1');
          localStorage.removeItem('invoice_counter');
          // Redirect to login
          window.location.href = './login.php';
        }
      } catch (err) {
        console.error('Logout failed:', err);
        localStorage.removeItem('auth_user');
        window.location.href = './login.php';
      }
    }
    
    // Check auth before loading app
    window.addEventListener('load', function() {
      checkAuthAndInitialize();
      loadAndDisplayAlerts();
    });
  </script>
  <script>
    // Load and display alerts for cashier
    async function loadAndDisplayAlerts() {
      try {
        const res = await fetch('./api.php?action=get_alerts');
        const json = await res.json();
        
        if (json.success) {
          displayCashierAlerts(json.data);
        }
      } catch (err) {
        console.error('Error loading alerts:', err);
      }
    }

    function displayCashierAlerts(alerts) {
      const alertsContainer = document.getElementById('alertsContent');
      const alertsBanner = document.getElementById('alertsBanner');
      const alertsCount = document.getElementById('alertsCount');
      
      let alertsHTML = '';
      let totalAlerts = 0;

      // Expired products
      if (alerts.expired && alerts.expired.length > 0) {
        totalAlerts += alerts.expired.length;
        alerts.expired.forEach(product => {
          alertsHTML += `
            <div class="alert-item">
              <span class="alert-icon">⚠️</span>
              <strong>${product.name}</strong> - منتهية الصلاحية (${product.expiry_date})
            </div>
          `;
        });
      }

      // Expiring soon products
      if (alerts.expiring_soon && alerts.expiring_soon.length > 0) {
        totalAlerts += alerts.expiring_soon.length;
        alerts.expiring_soon.forEach(product => {
          const expiryDate = new Date(product.expiry_date);
          const today = new Date();
          const daysLeft = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
          
          alertsHTML += `
            <div class="alert-item expiring">
              <span class="alert-icon">⏰</span>
              <strong>${product.name}</strong> - ينتهي بعد ${daysLeft} يوم
            </div>
          `;
        });
      }

      // Low stock products
      if (alerts.low_stock && alerts.low_stock.length > 0) {
        totalAlerts += alerts.low_stock.length;
        alerts.low_stock.forEach(product => {
          alertsHTML += `
            <div class="alert-item low-stock">
              <span class="alert-icon">📦</span>
              <strong>${product.name}</strong> - المخزون: ${product.stock} وحدة فقط
            </div>
          `;
        });
      }

      // Out of stock products
      if (alerts.out_of_stock && alerts.out_of_stock.length > 0) {
        totalAlerts += alerts.out_of_stock.length;
        alerts.out_of_stock.forEach(product => {
          alertsHTML += `
            <div class="alert-item">
              <span class="alert-icon">❌</span>
              <strong>${product.name}</strong> - نفذت من المخزون
            </div>
          `;
        });
      }

      if (totalAlerts > 0) {
        alertsContainer.innerHTML = alertsHTML;
        alertsCount.textContent = totalAlerts;
        alertsBanner.classList.add('show');
      } else {
        alertsBanner.classList.remove('show');
      }
    }
  </script>

    .window-tab-rename { border:none; background:transparent; color:#94a3b8; cursor:pointer; padding:0 6px; font-size:12px; align-self:stretch; }

    /* ===== Generic POS Modal ===== */
    .pos-modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:5000;
      display:flex; align-items:center; justify-content:center; padding:20px; }
    .pos-modal { background:#fff; border-radius:16px; width:100%; max-width:560px; max-height:90vh;
      overflow:auto; box-shadow:0 25px 70px rgba(0,0,0,.3); }
    .pos-modal.wide { max-width:860px; }
    .pos-modal-head { background:linear-gradient(135deg,#0891b2,#0e7490); color:#fff; padding:18px 22px;
      display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; }
    .pos-modal-head h3 { margin:0; font-size:18px; display:flex; gap:10px; align-items:center; }

      border-radius:8px; cursor:pointer; font-size:18px; }
    .pos-modal-body { padding:22px; }

    .pos-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pos-summary { background:#f8fafc; border-radius:12px; padding:16px; margin:8px 0 16px; }

    .pos-summary .row.insurance { color:#7c3aed; }
    .pos-summary .row.remaining { color:#dc2626; font-weight:700; }
    .pos-modal-foot { display:flex; gap:10px; padding:0 22px 22px; }
    .pos-btn { flex:1; padding:13px; border:none; border-radius:10px; cursor:pointer; font-weight:700; font-size:15px; }
    .pos-btn-primary { background:linear-gradient(135deg,#0891b2,#06b6d4); color:#fff; }
    .pos-btn-secondary { background:#f1f5f9; color:#475569; border:2px solid #e2e8f0; }
    .pos-table { width:100%; border-collapse:collapse; font-size:13px; }
    .pos-table th { background:#f1f5f9; padding:10px; text-align:right; font-weight:700; color:#334155; }
    .pos-table td { padding:10px; border-bottom:1px solid #eef2f7; text-align:right; }
    .pos-status { padding:3px 10px; border-radius:10px; font-size:12px; font-weight:600; }
